<!DOCTYPE html>
<html>
  <body>
    <h2>FastBoost Socket Chat Test</h2>

    <input id="token" placeholder="JWT token" style="width: 700px;" />
    <br /><br />

    <input id="orderId" placeholder="Order ID" style="width: 700px;" />
    <br /><br />

    <button onclick="connectSocket()">Connect + Join Chat</button>
    <button onclick="sendMessage()">Send Message</button>

    <br /><br />

    <input id="message" placeholder="Message" style="width: 700px;" />

    <pre id="log"></pre>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <script>
      let socket;
      let conversationId;

      function log(data) {
        document.getElementById("log").textContent +=
          JSON.stringify(data, null, 2) + "\n\n";
      }

      function connectSocket() {
        const token = document.getElementById("token").value.trim();
        const orderId = document.getElementById("orderId").value.trim();

        socket = io("http://localhost:5000", {
          auth: { token },
        });

        socket.on("connect", () => {
          log({ event: "connected", socketId: socket.id });

          socket.emit("chat:join", { orderId }, (response) => {
            log({ event: "chat:join response", response });

            if (response.ok) {
              conversationId = response.conversationId;
            }
          });
        });

        socket.on("connect_error", (error) => {
          log({ event: "connect_error", message: error.message });
        });

        socket.on("chat:message", (message) => {
          log({ event: "chat:message received", message });
        });

        socket.on("chat:typing", (payload) => {
          log({ event: "chat:typing", payload });
        });
      }

      function sendMessage() {
        const content = document.getElementById("message").value.trim();

        socket.emit(
          "chat:message",
          {
            conversationId,
            content,
          },
          (response) => {
            log({ event: "chat:message response", response });
          }
        );
      }
    </script>
  </body>
</html>
